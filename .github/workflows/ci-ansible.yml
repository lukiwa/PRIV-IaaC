name: Ansible Lint

on:
  pull_request:
    paths:
      - ansible/**
      - .github/workflows/ci-ansible.yml
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ansible-lint
        uses: ansible/ansible-lint@main
        with:
          args: "ansible/"
