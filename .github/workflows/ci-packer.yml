name: CI - Packer

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  packer-checks:
    name: Packer checks
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: packer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Packer init
        run: packer init config.pkr.hcl

      - name: Packer fmt check
        run: packer fmt -check -recursive .

      - name: Packer validate templates
        run: |
          set -euo pipefail

          mapfile -d '' templates < <(find . -type f -name '*.pkr.hcl' ! -name 'config.pkr.hcl' -print0)

          if [[ ${#templates[@]} -eq 0 ]]; then
            echo "No Packer templates found."
            exit 0
          fi

          for template in "${templates[@]}"; do
            template_dir="$(dirname "$template")"
            var_file="$template_dir/variables.pkr.hcl"

            cmd=(
              packer validate
              -var "proxmox_api_url=https://example.invalid:8006/api2/json"
              -var "proxmox_api_token_id=ci@pve!ci"
              -var "proxmox_api_token_secret=dummy-secret"
            )

            if [[ -f "$var_file" ]]; then
              cmd+=( -var-file "$var_file" )
            fi

            cmd+=( "$template" )

            echo "Validating: $template"
            "${cmd[@]}"
          done

