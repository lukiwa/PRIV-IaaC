name: CI - Terraform

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/ci-terraform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-checks:
    name: Terraform checks
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init + validate (all modules)
        shell: bash
        run: |
          set -euo pipefail

          declare -A tf_dirs=()

          while IFS= read -r -d '' tf_file; do
            tf_dirs["$(dirname "$tf_file")"]=1
          done < <(find terraform -type f -name '*.tf' ! -path '*/.terraform/*' -print0)

          if [[ ${#tf_dirs[@]} -eq 0 ]]; then
            echo "No Terraform directories found."
            exit 0
          fi

          for dir in "${!tf_dirs[@]}"; do
            echo "Validating: $dir"
            (
              cd "$dir"
              terraform init -backend=false -input=false -no-color
              terraform validate -no-color
            )
          done
