name: CI - Terraform

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/ci-terraform.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  terraform-checks:
    name: Terraform checks
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Terraform init + validate (root modules)
        shell: bash
        run: |
          set -euo pipefail

          declare -A all_tf_dirs=()
          declare -A root_tf_dirs=()

          while IFS= read -r -d '' tf_file; do
            all_tf_dirs["$(dirname "$tf_file")"]=1
          done < <(find terraform -type f -name '*.tf' ! -path '*/.terraform/*' -print0)

          if [[ ${#all_tf_dirs[@]} -eq 0 ]]; then
            echo "No Terraform directories found."
            exit 0
          fi

          for dir in "${!all_tf_dirs[@]}"; do
            parent="$(dirname "$dir")"
            is_child_module=false

            while [[ "$parent" == terraform/* ]]; do
              if [[ -n "${all_tf_dirs[$parent]:-}" ]]; then
                is_child_module=true
                break
              fi
              parent="$(dirname "$parent")"
            done

            if [[ "$is_child_module" == false ]]; then
              root_tf_dirs["$dir"]=1
            fi
          done

          for dir in $(printf '%s\n' "${!root_tf_dirs[@]}" | sort); do
            echo "Validating: $dir"
            (
              cd "$dir"
              terraform init -backend=false -input=false -no-color
              terraform validate -no-color
            )
          done
