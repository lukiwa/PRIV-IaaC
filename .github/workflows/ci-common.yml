name: CI - Common checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-common-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  codespell:
    name: Spell check
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: ".git,*.lock"

  gitleaks:
    name: Secret scan
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set gitleaks scope
        run: |
          set -euo pipefail

          base_args='--redact -v --exit-code=2 --report-format=sarif --report-path=results.sarif'

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "GITLEAKS_ARGS=$base_args --log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_ENV"
          else
            echo "GITLEAKS_ARGS=$base_args" >> "$GITHUB_ENV"
          fi

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ARGS: ${{ env.GITLEAKS_ARGS }}
