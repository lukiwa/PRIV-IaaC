---
- name: Allow unprivileged processes to bind to port 80 and above
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "80"
    state: present
    sysctl_set: true
    reload: true
  become: true

- name: Create Traefik dynamic config directory
  ansible.builtin.file:
    path: "{{ item.config_dir }}/dynamic"
    state: directory
    mode: "0755"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: Template Traefik static config
  ansible.builtin.template:
    src: containers/traefik/traefik.yml.j2
    dest: "{{ item.config_dir }}/traefik.yml"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: Template Traefik dynamic media config
  ansible.builtin.template:
    src: containers/traefik/dynamic/media.yml.j2
    dest: "{{ item.config_dir }}/dynamic/media.yml"
    mode: "0644"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  become: true

- name: Create or update Traefik Quadlet definition
  containers.podman.podman_container:
    name: "{{ item.name }}"
    image: docker.io/traefik:latest
    state: quadlet
    quadlet_dir: "{{ infra_quadlet_user_dir }}"
    quadlet_filename: "{{ item.name }}"
    quadlet_file_mode: "0644"
    network: "{{ item.network | default(['host']) }}"
    ports: "{{ item.ports | default([]) }}"
    command:
      - "--configfile=/config/traefik.yml"
    volume:
      - "{{ item.config_dir }}/traefik.yml:/config/traefik.yml:ro,Z"
      - "{{ item.config_dir }}/dynamic:/config/dynamic:ro,Z"
    env: "{{ item.meta.env }}"
    quadlet_options: "{{ infra_quadlet_options_main + (item.quadlet_options_extra | default([])) }}"
  become: true
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ infra_quadlet_runtime_dir }}"
  notify: Reload systemd user daemon
