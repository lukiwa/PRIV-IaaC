- name: Set stack local variables
  ansible.builtin.set_fact:
    microos_media_stack_operation: "{{ stack.operation | default('update') }}"
    microos_media_stack_data_dir: "{{ stack.project_dir }}/data"
    microos_media_stack_plex_container_name: "{{ stack.plex_container_name | default('plex') }}"
    microos_media_stack_plex_preferences: "{{ stack.plex_preferences | default({}) }}"
    microos_media_stack_media_mount_root: "{{ stack.media_mount_root }}"
    microos_media_stack_plex_x_plex_token: "{{ stack.plex_x_plex_token | default('') }}"

- name: Ensure stack project directory exists
  ansible.builtin.file:
    path: "{{ stack.project_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  become: true

- name: Stop stack containers before deploy
  ansible.builtin.command: "podman-compose -f {{ stack.project_dir }}/{{ stack.compose_file_name }} down"
  become: false
  changed_when: true
  failed_when: false
  when: microos_media_stack_operation == 'deploy'

- name: Remove stack data directory before deploy
  ansible.builtin.file:
    path: "{{ microos_media_stack_data_dir }}"
    state: absent
  become: true
  when: microos_media_stack_operation == 'deploy'

- name: Remove stack compose file before deploy
  ansible.builtin.file:
    path: "{{ stack.project_dir }}/{{ stack.compose_file_name }}"
    state: absent
  become: true
  when: microos_media_stack_operation == 'deploy'

- name: Ensure stack data directory exists
  ansible.builtin.file:
    path: "{{ microos_media_stack_data_dir }}"
    state: directory
    mode: "0775"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  become: true

- name: Ensure Plex config directory exists
  ansible.builtin.file:
    path: "{{ microos_media_stack_data_dir }}/{{ microos_media_stack_plex_container_name }}"
    state: directory
    mode: "0775"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  become: true

- name: Ensure Plex preferences directory exists
  ansible.builtin.file:
    path: "{{ microos_media_stack_data_dir }}/{{ microos_media_stack_plex_container_name }}/Library/Application Support/Plex Media Server"
    state: directory
    mode: "0775"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  become: true
  when: microos_media_stack_plex_preferences | length > 0

- name: Resolve compose user UID
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ microos_media_podman_compose_user }}"
  register: microos_media_podman_compose_uid_result
  changed_when: false

- name: Resolve compose user GID
  ansible.builtin.command:
    argv:
      - id
      - -g
      - "{{ microos_media_podman_compose_user }}"
  register: microos_media_podman_compose_gid_result
  changed_when: false

- name: Ensure Plex token exists for deploy claim
  ansible.builtin.assert:
    that:
      - microos_media_stack_plex_x_plex_token | length > 0
    fail_msg: "Set stack.plex_x_plex_token in host_vars to generate PLEX_CLAIM during deploy"
  when: microos_media_stack_operation == 'deploy'

- name: Generate fresh Plex claim token
  ansible.builtin.uri:
    url: "https://plex.tv/api/claim/token?X-Plex-Token={{ microos_media_stack_plex_x_plex_token }}"
    method: GET
    return_content: true
  register: microos_media_plex_claim_response
  when: microos_media_stack_operation == 'deploy'

- name: Extract Plex claim token
  ansible.builtin.set_fact:
    microos_media_plex_claim_token: "{{ microos_media_plex_claim_response.content | regex_search('token=\"([^\"]+)\"', '\\1') | first }}"
  when: microos_media_stack_operation == 'deploy'

- name: Render stack compose file
  ansible.builtin.template:
    src: "{{ stack.compose_template }}"
    dest: "{{ stack.project_dir }}/{{ stack.compose_file_name }}"
    mode: "0644"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  register: microos_media_podman_compose_file_result
  become: true

- name: Create Plex Preferences.xml
  ansible.builtin.template:
    src: "{{ stack.preferences_template }}"
    dest: "{{ microos_media_stack_data_dir }}/{{ microos_media_stack_plex_container_name }}/Library/Application Support/Plex Media Server/Preferences.xml"
    mode: "0644"
    owner: "{{ microos_media_podman_compose_user }}"
    group: "{{ microos_media_podman_compose_user }}"
  register: microos_media_plex_preferences_result
  become: true
  when:
    - microos_media_stack_plex_preferences | length > 0
    - microos_media_stack_operation == 'deploy'

- name: Update stack containers
  ansible.builtin.command: "podman-compose -f {{ stack.project_dir }}/{{ stack.compose_file_name }} up -d"
  register: microos_media_podman_compose_up_result
  become: false
  changed_when: >-
    'Creating' in microos_media_podman_compose_up_result.stdout
    or 'Recreating' in microos_media_podman_compose_up_result.stdout
    or 'Starting' in microos_media_podman_compose_up_result.stdout
    or microos_media_podman_compose_file_result.changed
    or (microos_media_plex_preferences_result is defined and microos_media_plex_preferences_result.changed)
  when: microos_media_stack_operation == 'update'

- name: Deploy stack containers
  ansible.builtin.command: "podman-compose -f {{ stack.project_dir }}/{{ stack.compose_file_name }} up -d"
  register: microos_media_podman_compose_deploy_result
  become: false
  changed_when: true
  when: microos_media_stack_operation == 'deploy'

# plex sometimes does not claim the server on first start, restarting the container is often needed
- name: Wait before Plex restart after deploy
  ansible.builtin.pause:
    seconds: 60
  when: microos_media_stack_operation == 'deploy'

- name: Restart Plex container after deploy
  ansible.builtin.command: "podman restart {{ microos_media_stack_plex_container_name }}"
  register: microos_media_plex_restart_result
  become: false
  changed_when: true
  when: microos_media_stack_operation == 'deploy'
