- name: Ensure podman-compose project directory exists
  ansible.builtin.file:
    path: "{{ podman_compose_project_dir }}"
    state: directory
    mode: "0755"
  become: false
  when: podman_compose_enabled | bool

- name: Ensure Plex config directory exists
  ansible.builtin.file:
    path: "{{ plex_config_dir }}"
    state: directory
    mode: "0775"
  become: false
  when: podman_compose_enabled | bool

- name: Resolve compose user UID
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ podman_compose_user }}"
  register: podman_compose_uid_result
  changed_when: false
  when: podman_compose_enabled | bool

- name: Resolve compose user GID
  ansible.builtin.command:
    argv:
      - id
      - -g
      - "{{ podman_compose_user }}"
  register: podman_compose_gid_result
  changed_when: false
  when: podman_compose_enabled | bool

- name: Create podman-compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ podman_compose_project_dir }}/{{ podman_compose_file_name }}"
    mode: "0644"
  register: podman_compose_file_result
  become: false
  when: podman_compose_enabled | bool

- name: Start podman-compose stack
  ansible.builtin.command: podman-compose -f {{ podman_compose_project_dir }}/{{ podman_compose_file_name }} up -d
  register: podman_compose_up_result
  become: false
  changed_when: >-
    'Creating' in podman_compose_up_result.stdout
    or 'Recreating' in podman_compose_up_result.stdout
    or 'Starting' in podman_compose_up_result.stdout
    or podman_compose_file_result.changed
  when: podman_compose_enabled | bool
