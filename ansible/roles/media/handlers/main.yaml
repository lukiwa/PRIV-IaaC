---
- name: Reload systemd user daemon
  ansible.builtin.systemd_service:
    scope: user
    daemon_reload: true
  become: true
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ media_quadlet_runtime_dir }}"

- name: Enable podman auto-update timer
  ansible.builtin.systemd_service:
    name: podman-auto-update.timer
    enabled: true
    state: started
    scope: user
  become: true
  become_user: "{{ ansible_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ media_quadlet_runtime_dir }}"
