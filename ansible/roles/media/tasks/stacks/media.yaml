- name: Set stack variables
  ansible.builtin.set_fact:
    media_stack_operation: "{{ stack.operation | default('update') }}"
    media_stack_project_dir: "{{ stack.project_dir }}"
    media_stack_data_dir: "{{ stack.project_dir }}/data"
    media_stack_plex_container_name: "{{ stack.plex_container_name | default('plex') }}"
    media_stack_plex_preferences: "{{ stack.plex_preferences | default({}) }}"
    media_stack_media_mount_root: "{{ stack.media_mount_root }}"
    media_stack_plex_x_plex_token: "{{ stack.plex_x_plex_token | default('') }}"

- name: Resolve quadlet user UID
  ansible.builtin.command:
    argv:
      - id
      - -u
      - "{{ media_quadlet_user }}"
  register: media_quadlet_uid_result
  changed_when: false

- name: Set quadlet variables
  ansible.builtin.set_fact:
    media_stack_quadlet_user_dir: "/home/{{ media_quadlet_user }}/.config/containers/systemd"
    media_stack_quadlet_runtime_dir: "/run/user/{{ media_quadlet_uid_result.stdout }}"
    media_stack_quadlet_service: "{{ media_stack_plex_container_name }}.service"

- name: Create required stack directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ media_quadlet_user }}"
    group: "{{ media_quadlet_user }}"
  loop:
    - path: "{{ media_stack_project_dir }}"
      mode: "0755"
    - path: "{{ media_stack_data_dir }}"
      mode: "0775"
    - path: "{{ media_stack_quadlet_user_dir }}"
      mode: "0755"
    - path: "{{ media_stack_data_dir }}/{{ media_stack_plex_container_name }}"
      mode: "0775"
  become: true

- name: Enable systemd linger for quadlet user
  ansible.builtin.command: "loginctl enable-linger {{ media_quadlet_user }}"
  become: true
  changed_when: false

- name: Stop quadlet service before deploy
  ansible.builtin.systemd_service:
    name: "{{ media_stack_quadlet_service }}"
    enabled: false
    state: stopped
    scope: user
  become: true
  become_user: "{{ media_quadlet_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ media_stack_quadlet_runtime_dir }}"
  failed_when: false
  when: media_stack_operation == 'deploy'

- name: Remove stack data directory before deploy
  ansible.builtin.file:
    path: "{{ media_stack_data_dir }}"
    state: absent
  become: true
  when: media_stack_operation == 'deploy'

- name: Create required directories after deploy cleanup
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ media_quadlet_user }}"
    group: "{{ media_quadlet_user }}"
  loop:
    - path: "{{ media_stack_data_dir }}"
      mode: "0775"
    - path: "{{ media_stack_data_dir }}/{{ media_stack_plex_container_name }}"
      mode: "0775"
    - path: "{{ media_stack_data_dir }}/{{ media_stack_plex_container_name }}/Library/Application Support/Plex Media Server"
      mode: "0775"
      enabled: "{{ media_stack_plex_preferences | length > 0 }}"
  become: true
  when:
    - media_stack_operation == 'deploy'
    - item.enabled | default(true)

- name: Check Plex token exists for deploy claim
  ansible.builtin.assert:
    that:
      - media_stack_plex_x_plex_token | length > 0
    fail_msg: "Set stack.plex_x_plex_token in host_vars to generate PLEX_CLAIM during deploy"
  when: media_stack_operation == 'deploy'
  no_log: true

- name: Generate fresh Plex claim token
  ansible.builtin.uri:
    url: "https://plex.tv/api/claim/token?X-Plex-Token={{ media_stack_plex_x_plex_token }}"
    method: GET
    return_content: true
  register: media_plex_claim_response
  when: media_stack_operation == 'deploy'
  no_log: true

- name: Extract Plex claim token
  ansible.builtin.set_fact:
    media_plex_claim_token: >-
      {{
        (media_plex_claim_response.content | default('')
        | regex_findall('token="([^"]+)"') | first)
        | default('')
      }}
  when: media_stack_operation == 'deploy'
  no_log: true

- name: Validate extracted Plex claim token
  ansible.builtin.assert:
    that:
      - media_plex_claim_token | length > 0
    fail_msg: "Failed to get PLEX_CLAIM from Plex API. Check media_plex_x_plex_token."
  when: media_stack_operation == 'deploy'
  no_log: true

- name: Create Plex Preferences file
  ansible.builtin.template:
    src: "{{ stack.preferences_template }}"
    dest: "{{ media_stack_data_dir }}/{{ media_stack_plex_container_name }}/Library/Application Support/Plex Media Server/Preferences.xml"
    mode: "0644"
    owner: "{{ media_quadlet_user }}"
    group: "{{ media_quadlet_user }}"
  become: true
  when:
    - media_stack_plex_preferences | length > 0
    - media_stack_operation == 'deploy'

- name: Run quadlet service actions in user scope
  become: true
  become_user: "{{ media_quadlet_user }}"
  environment:
    XDG_RUNTIME_DIR: "{{ media_stack_quadlet_runtime_dir }}"
  block:
    - name: Create/update Plex Quadlet definition
      containers.podman.podman_container:
        name: "{{ media_stack_plex_container_name }}"
        image: "lscr.io/linuxserver/plex:latest"
        state: quadlet
        quadlet_dir: "{{ media_stack_quadlet_user_dir }}"
        quadlet_filename: "{{ media_stack_plex_container_name }}"
        quadlet_file_mode: "0644"
        network:
          - host
        userns: keep-id
        volume:
          - "{{ media_stack_data_dir }}/{{ media_stack_plex_container_name }}:/config:Z,U"
          - "{{ media_stack_media_mount_root }}/tv:/tv"
          - "{{ media_stack_media_mount_root }}/movies:/movies"
          - "{{ media_stack_media_mount_root }}/music:/music"
        env: >-
          {{
            {'PLEX_CLAIM': media_plex_claim_token}
            if (media_stack_operation == 'deploy'
                and media_plex_claim_token is defined
                and media_plex_claim_token | length > 0)
            else {}
          }}
        quadlet_options:
          - |
            [Container]
            AutoUpdate=registry
          - |
            [Unit]
            Wants=network-online.target
            After=network-online.target
            RequiresMountsFor={{ media_stack_media_mount_root }}
          - |
            [Service]
            Restart=always
            RestartSec=5
          - |
            [Install]
            WantedBy=default.target

    - name: Reload systemd user daemon
      ansible.builtin.systemd_service:
        scope: user
        daemon_reload: true

    - name: Enable and start quadlet service
      ansible.builtin.systemd_service:
        name: "{{ media_stack_quadlet_service }}"
        enabled: true
        state: started
        scope: user

    - name: Enable podman auto-update timer
      ansible.builtin.systemd_service:
        name: podman-auto-update.timer
        enabled: true
        state: started
        scope: user
      when: media_quadlet_auto_update

    - name: Wait before Plex restart after deploy
      ansible.builtin.pause:
        seconds: 60
      when: media_stack_operation == 'deploy'

    - name: Restart quadlet service after deploy
      ansible.builtin.systemd_service:
        name: "{{ media_stack_quadlet_service }}"
        state: restarted
        scope: user
      changed_when: true
      when: media_stack_operation == 'deploy'
