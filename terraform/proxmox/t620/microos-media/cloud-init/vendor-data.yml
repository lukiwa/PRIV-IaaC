#cloud-config
# As redundant as it may seem:
# - root login disabled from: PVE passwd, SSH passwd, SSH key, su passwd
# - mediauser login enabled from: PVE passwd, SSH key
# - mediauser access to sudo with its password, but not root password, and not without password

disable_root: true
ssh_pwauth: false

bootcmd:
  - usermod -L root

write_files:
  - path: /etc/ssh/sshd_config.d/99-cloud-hardening.conf
    permissions: "0640"
    owner: root:root
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      ChallengeResponseAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no
  - path: /etc/sudoers.d/99-mediauser-require-password
    permissions: "0440"
    owner: root:root
    content: |
      Defaults:mediauser !targetpw
      Defaults:mediauser !rootpw
      Defaults:mediauser !runaspw
      mediauser ALL=(ALL:ALL) ALL
  - path: /usr/local/sbin/setup-external-ntfs.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      mount_point="/var/mnt/external"
      uid="$(id -u mediauser)"
      gid="$(id -g mediauser)"

      mkdir -p "$mount_point"
      echo "/dev/disk/by-path/virtio-pci-0000:00:0b.0-part1 $mount_point ntfs-3g rw,noatime,nosuid,nodev,nofail,x-systemd.device-timeout=2s,uid=$uid,gid=$gid,dmask=002,fmask=113 0 0" >> /etc/fstab
      mount -a

runcmd:
  - usermod -aG wheel mediauser
  - /usr/local/sbin/setup-external-ntfs.sh
  - systemctl restart sshd
